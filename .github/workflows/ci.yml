name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prisma generate
        run: npm run prisma:generate
      - name: Prisma schema validate
        run: npx prisma validate --schema=apps/api/prisma/schema.prisma
      - name: Typecheck (workspaces)
        run: npm run typecheck
      - name: Build (packages + api + dashboard + mobile export)
        run: npm run build
      - name: Test (workspaces)
        run: npm test

  docker-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t drivewise-api:ci .
