name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prisma generate
        run: npm run prisma:generate
      - name: Prisma schema validate
        run: npx prisma validate --schema=apps/api/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://drivewise:drivewise_secret@localhost:5432/drivewise
      - name: Typecheck (workspaces)
        run: npm run typecheck
      - name: Build (packages + api + dashboard + mobile export)
        run: npm run build
      - name: Test (workspaces)
        run: npm test

  docker-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t drivewise-api:ci .
