# Infrastructure for DriveWise (PostgreSQL + Redis).
# The API and dashboard run on the host (npm run dev) or as separately
# deployed services. Point DATABASE_URL at this Postgres service or host port
# as needed (see DEPLOYMENT.md).
services:
  postgres:
    image: postgres:16-alpine
    container_name: drivewise_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drivewise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drivewise_secret}
      POSTGRES_DB: ${POSTGRES_DB:-drivewise}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-drivewise} -d ${POSTGRES_DB:-drivewise}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: drivewise_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
